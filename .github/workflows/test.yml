name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # The shell-integration tests run a real zsh; without this they would
      # be skipped on Linux and only macOS developers would exercise them.
      - run: sudo apt-get update && sudo apt-get install -y zsh
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q -W error
      - run: python -m compileall -q token_sprout tests
      - run: python -m pip check

  package-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip build pip-audit
      - run: python -m pip install -e .
      - run: python -m build
      - run: python -m pip_audit --local --skip-editable
      - run: python -m venv /tmp/token-sprout-wheel-smoke
      - run: /tmp/token-sprout-wheel-smoke/bin/pip install dist/*.whl
      - run: /tmp/token-sprout-wheel-smoke/bin/token-sprout --version
