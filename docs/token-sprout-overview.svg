<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Token Sprout technical flow · 技術流程</title>
  <desc id="desc">A bilingual newcomer-friendly overview of setup, local proxy data flow, private files, Claude Code compatibility, plant displays, and growth stages.</desc>

  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7faf3"/>
      <stop offset="1" stop-color="#eef5e9"/>
    </linearGradient>
    <linearGradient id="proxy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dff2d8"/>
      <stop offset="1" stop-color="#c7e8be"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#173a2b" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#47705b"/>
    </marker>
    <marker id="arrow-small" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#47705b"/>
    </marker>
    <marker id="stage-arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#8fb39b"/>
    </marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .eyebrow { font-size: 14px; font-weight: 800; letter-spacing: 2px; fill: #47705b; }
      .card-title { font-size: 26px; font-weight: 800; fill: #173a2b; }
      .body { font-size: 18px; font-weight: 500; fill: #385747; }
      .small { font-size: 15px; font-weight: 600; fill: #577063; }
      .code { font-size: 17px; font-weight: 700; fill: #e9f8ed; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#page)"/>
  <circle cx="1515" cy="64" r="92" fill="#dcefd4" opacity="0.65"/>
  <circle cx="70" cy="942" r="135" fill="#e4f2dd" opacity="0.75"/>

  <!-- Header -->
  <g class="sans">
    <text x="80" y="72" font-size="46" font-weight="850" fill="#173a2b">Token Sprout · 技術流程</text>
    <text x="80" y="108" font-size="21" font-weight="550" fill="#5a7164">Your Claude Code tokens grow a tiny terminal plant. · 讓 token 養成一株終端小植物</text>
  </g>
  <g transform="translate(1468 28)">
    <path d="M24 62 C25 39, 24 25, 36 10" fill="none" stroke="#2d6a4f" stroke-width="7" stroke-linecap="round"/>
    <path d="M35 12 C51 5, 62 13, 58 28 C44 31, 35 24, 35 12Z" fill="#74b96c"/>
    <path d="M25 37 C9 27, -2 35, 2 50 C16 53, 25 48, 25 37Z" fill="#4c9b5f"/>
    <path d="M9 65 H43 L38 88 H14Z" fill="#b06c46"/>
    <path d="M12 65 H40" stroke="#7f4c34" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Quick start strip -->
  <g filter="url(#shadow)" class="sans">
    <rect x="80" y="140" width="1420" height="105" rx="25" fill="#ffffff"/>
    <text x="108" y="171" class="eyebrow">START IN THREE STEPS · 三步完成</text>

    <circle cx="128" cy="208" r="20" fill="#2d6a4f"/>
    <text x="128" y="215" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">1</text>
    <text x="160" y="202" class="small">Install once · 安裝一次</text>
    <text x="160" y="226" class="mono" font-size="17" font-weight="700" fill="#173a2b">pipx install .</text>

    <path d="M470 207 H520" stroke="#a6bead" stroke-width="3" marker-end="url(#arrow)"/>

    <circle cx="570" cy="208" r="20" fill="#2d6a4f"/>
    <text x="570" y="215" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">2</text>
    <text x="602" y="202" class="small">Enable integration · 啟用整合</text>
    <text x="602" y="226" class="mono" font-size="15" font-weight="700" fill="#173a2b">init · install-claude · install-statusline</text>

    <path d="M1080 207 H1130" stroke="#a6bead" stroke-width="3" marker-end="url(#arrow)"/>

    <circle cx="1180" cy="208" r="20" fill="#2d6a4f"/>
    <text x="1180" y="215" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">3</text>
    <text x="1212" y="202" class="small">Daily command · 日常啟動</text>
    <text x="1212" y="226" class="mono" font-size="18" font-weight="800" fill="#173a2b">claude</text>
  </g>

  <!-- Main data flow -->
  <g class="sans">
    <text x="80" y="290" class="eyebrow">WHEN YOU TYPE “CLAUDE” · 啟動後的資料流</text>

    <!-- Claude Code terminal -->
    <g filter="url(#shadow)">
      <rect x="80" y="315" width="390" height="230" rx="28" fill="#16352a"/>
      <rect x="80" y="315" width="390" height="45" rx="28" fill="#214b3b"/>
      <rect x="80" y="338" width="390" height="22" fill="#214b3b"/>
      <circle cx="108" cy="338" r="6" fill="#f0a695"/>
      <circle cx="130" cy="338" r="6" fill="#eed17d"/>
      <circle cx="152" cy="338" r="6" fill="#83c28d"/>
      <text x="275" y="344" text-anchor="middle" font-size="15" font-weight="750" fill="#c9e5d2">Claude Code</text>
      <text x="108" y="400" class="mono code">$ claude</text>
      <text x="108" y="442" class="mono" font-size="16" fill="#9cc8a9">Thinking…</text>
      <rect x="106" y="472" width="338" height="45" rx="10" fill="#0f2a20"/>
      <g transform="translate(122 481)" fill="#77c77a" stroke="#77c77a" stroke-linecap="round">
        <path d="M6 17 V8" stroke-width="2"/><ellipse cx="3" cy="7" rx="4" ry="2.5" transform="rotate(28 3 7)"/><ellipse cx="9" cy="5" rx="4" ry="2.5" transform="rotate(-28 9 5)"/>
        <path d="M25 17 V8" stroke-width="2"/><ellipse cx="22" cy="7" rx="4" ry="2.5" transform="rotate(28 22 7)"/><ellipse cx="28" cy="5" rx="4" ry="2.5" transform="rotate(-28 28 5)"/>
      </g>
      <text x="158" y="500" class="mono" font-size="13" font-weight="700" fill="#d8f2df">2/20 ·</text>
      <path d="M216 483 C207 494, 208 501, 216 504 C224 501, 225 494, 216 483Z" fill="#62b6e8"/>
      <rect x="235" y="488" width="120" height="14" rx="3" fill="#244b3c" stroke="#a8ceb1" stroke-width="1"/>
      <rect x="237" y="490" width="72" height="10" rx="2" fill="#bfe4c5"/>
      <text x="366" y="500" class="mono" font-size="13" font-weight="700" fill="#d8f2df">67%</text>
    </g>

    <!-- Local proxy -->
    <g filter="url(#shadow)">
      <rect x="605" y="332" width="390" height="196" rx="34" fill="url(#proxy)" stroke="#8fc486" stroke-width="2"/>
      <circle cx="665" cy="393" r="34" fill="#ffffff" opacity="0.78"/>
      <path d="M665 369 C649 389, 649 399, 665 410 C681 399, 681 389, 665 369Z" fill="#4b9c73"/>
      <text x="715" y="375" class="eyebrow">LOCAL PROXY</text>
      <text x="715" y="408" class="card-title">Token Sprout proxy</text>
      <text x="715" y="438" class="mono" font-size="17" font-weight="750" fill="#2d6a4f">127.0.0.1:8000</text>
      <line x1="640" y1="465" x2="960" y2="465" stroke="#9bc896" stroke-width="2"/>
      <text x="800" y="490" text-anchor="middle" class="body">raw-byte stream · no retry</text>
      <text x="800" y="514" text-anchor="middle" class="small">fail-open usage tee · 不阻塞回應</text>
    </g>

    <!-- Anthropic API -->
    <g filter="url(#shadow)">
      <rect x="1130" y="315" width="370" height="230" rx="28" fill="#ffffff"/>
      <circle cx="1192" cy="388" r="38" fill="#efe9dc"/>
      <path d="M1168 400 C1171 381, 1185 370, 1202 373 C1211 358, 1236 365, 1234 384 C1252 387, 1253 414, 1232 418 H1182 C1170 418, 1164 410, 1168 400Z" fill="#b68a63" opacity="0.85"/>
      <text x="1250" y="380" class="eyebrow">UPSTREAM</text>
      <text x="1250" y="413" class="card-title">Anthropic API</text>
      <line x1="1165" y1="453" x2="1465" y2="453" stroke="#e4e1da" stroke-width="2"/>
      <text x="1315" y="487" text-anchor="middle" class="body">same API endpoint</text>
      <text x="1315" y="516" text-anchor="middle" class="small">forwards your existing authentication</text>
    </g>

    <!-- Direction arrows -->
    <path d="M485 405 H580" stroke="#47705b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="493" y="351" width="78" height="27" rx="13.5" fill="#f3f8ef"/>
    <text x="532" y="371" text-anchor="middle" class="small">request</text>
    <path d="M1015 405 H1110" stroke="#47705b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M580 455 H485" stroke="#47705b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M1115 455 H1020" stroke="#47705b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="1027" y="484" width="82" height="27" rx="13.5" fill="#f3f8ef"/>
    <text x="1068" y="504" text-anchor="middle" class="small">stream</text>

    <!-- Tee to local state -->
    <path d="M800 530 V544" stroke="#6a9878" stroke-width="4" stroke-dasharray="7 7" fill="none"/>
    <rect x="665" y="548" width="270" height="30" rx="15" fill="#eef7eb"/>
    <text x="800" y="569" text-anchor="middle" class="small">usage metadata only · 只取用量</text>
    <path d="M800 582 V595" stroke="#6a9878" stroke-width="4" stroke-dasharray="7 7" fill="none" marker-end="url(#arrow-small)"/>

    <rect x="1015" y="558" width="485" height="32" rx="16" fill="#fff3dc" stroke="#e8c37b"/>
    <text x="1257" y="580" text-anchor="middle" class="small" fill="#765a26">Tool search kept · Remote Control unavailable</text>
  </g>

  <!-- Lower cards -->
  <g class="sans">
    <!-- Security -->
    <g filter="url(#shadow)">
      <rect x="80" y="610" width="430" height="190" rx="26" fill="#ffffff"/>
      <text x="110" y="647" class="eyebrow">SECURITY · 資安邊界</text>
      <text x="110" y="681" class="card-title">Private data stays private</text>
      <circle cx="122" cy="716" r="8" fill="#50a46c"/>
      <text x="142" y="722" class="body">no prompt, response, or auth written</text>
      <circle cx="122" cy="750" r="8" fill="#50a46c"/>
      <text x="142" y="756" class="body">localhost + port-bound HMAC check</text>
      <circle cx="122" cy="784" r="8" fill="#50a46c"/>
      <text x="142" y="790" class="body">arguments hidden · logs sanitized</text>
    </g>

    <!-- State -->
    <g filter="url(#shadow)">
      <rect x="540" y="610" width="380" height="190" rx="26" fill="#ffffff"/>
      <text x="570" y="647" class="eyebrow">LOCAL FILES · 本機檔案</text>
      <text x="570" y="681" class="card-title">Private by default</text>
      <rect x="570" y="705" width="320" height="47" rx="10" fill="#f0f5ed"/>
      <text x="730" y="735" text-anchor="middle" class="mono" font-size="16" font-weight="750" fill="#2d5943">~/.token-sprout/  0700</text>
      <text x="570" y="780" class="small">state · log · secret · lock  —  all 0600</text>
    </g>

    <!-- Views -->
    <g filter="url(#shadow)">
      <rect x="1000" y="610" width="500" height="190" rx="26" fill="#ffffff"/>
      <text x="1030" y="647" class="eyebrow">READ-ONLY VIEWS · 唯讀畫面</text>
      <text x="1030" y="681" class="card-title">See the same plant anywhere</text>
      <rect x="1030" y="706" width="440" height="42" rx="9" fill="#173a2b"/>
      <g transform="translate(1050 713)" fill="#77c77a" stroke="#77c77a" stroke-linecap="round">
        <path d="M5 16 V8" stroke-width="2"/><ellipse cx="2" cy="7" rx="3.5" ry="2.2" transform="rotate(28 2 7)"/><ellipse cx="8" cy="5" rx="3.5" ry="2.2" transform="rotate(-28 8 5)"/>
        <path d="M21 16 V8" stroke-width="2"/><ellipse cx="18" cy="7" rx="3.5" ry="2.2" transform="rotate(28 18 7)"/><ellipse cx="24" cy="5" rx="3.5" ry="2.2" transform="rotate(-28 24 5)"/>
      </g>
      <text x="1082" y="733" class="mono" font-size="12" font-weight="700" fill="#e9f8ed">2/20 ·</text>
      <path d="M1133 716 C1126 725, 1127 731, 1133 733 C1139 731, 1140 725, 1133 716Z" fill="#62b6e8"/>
      <rect x="1148" y="721" width="108" height="12" rx="3" fill="#294e40" stroke="#a8ceb1" stroke-width="1"/>
      <rect x="1150" y="723" width="65" height="8" rx="2" fill="#bfe4c5"/>
      <text x="1265" y="732" class="mono" font-size="12" font-weight="700" fill="#e9f8ed">67% · +5,000 tokens</text>
      <text x="1030" y="779" class="small">statusline inside Claude · watch animation · status summary</text>
    </g>

    <path d="M940 729 H980" stroke="#47705b" stroke-width="3" stroke-linecap="round" fill="none" marker-end="url(#arrow-small)"/>
  </g>

  <!-- Growth strip -->
  <g filter="url(#shadow)" class="sans">
    <rect x="80" y="835" width="1420" height="120" rx="28" fill="#173a2b"/>
    <text x="112" y="872" font-size="14" font-weight="800" letter-spacing="2" fill="#9dc9a7">GROWTH · 累積到開花才重置</text>
    <text x="112" y="907" font-size="18" font-weight="750" fill="#f1f8ef">10,000 × 20 × 20 × 20 × 20 = 1.6B → bloom</text>
    <text x="112" y="936" font-size="14" font-weight="650" fill="#9dc9a7">unit cost · 單顆成本：10k seed · 200k sprout · 4m leaf · 80m bud · 1.6b bloom</text>

    <g transform="translate(1010 858)">
      <!-- seed -->
      <ellipse cx="18" cy="27" rx="14" ry="17" fill="#aa714e" transform="rotate(18 18 27)"/>
      <path d="M43 27 H71" stroke="#8fb39b" stroke-width="2" stroke-linecap="round" fill="none" marker-end="url(#stage-arrow)"/>
      <!-- sprout -->
      <path d="M100 43 V20" stroke="#78bd71" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="90" cy="20" rx="11" ry="6" fill="#60a961" transform="rotate(28 90 20)"/>
      <ellipse cx="111" cy="14" rx="12" ry="7" fill="#82c87a" transform="rotate(-28 111 14)"/>
      <path d="M132 27 H153" stroke="#8fb39b" stroke-width="2" stroke-linecap="round" fill="none" marker-end="url(#stage-arrow)"/>
      <!-- leaf plant -->
      <path d="M184 40 V15" stroke="#78bd71" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="174" cy="21" rx="12" ry="7" fill="#5ea862" transform="rotate(28 174 21)"/>
      <ellipse cx="195" cy="15" rx="13" ry="7" fill="#86c97b" transform="rotate(-28 195 15)"/>
      <path d="M170 39 H198 L194 51 H174Z" fill="#aa714e"/>
      <path d="M217 27 H242" stroke="#8fb39b" stroke-width="2" stroke-linecap="round" fill="none" marker-end="url(#stage-arrow)"/>
      <!-- bud -->
      <path d="M270 46 V18" stroke="#78bd71" stroke-width="4" stroke-linecap="round"/>
      <path d="M270 21 C254 14, 256 0, 270 0 C284 0, 286 14, 270 21Z" fill="#d3788e"/>
      <ellipse cx="260" cy="31" rx="9" ry="5" fill="#5ea862" transform="rotate(30 260 31)"/>
      <path d="M297 27 H324" stroke="#8fb39b" stroke-width="2" stroke-linecap="round" fill="none" marker-end="url(#stage-arrow)"/>
      <!-- bloom -->
      <g transform="translate(360 19)">
        <ellipse cx="0" cy="-12" rx="8" ry="14" fill="#e990a3"/>
        <ellipse cx="12" cy="0" rx="14" ry="8" fill="#e990a3"/>
        <ellipse cx="0" cy="12" rx="8" ry="14" fill="#e990a3"/>
        <ellipse cx="-12" cy="0" rx="14" ry="8" fill="#e990a3"/>
        <circle r="7" fill="#e7bd58"/>
      </g>
      <path d="M360 32 V48" stroke="#78bd71" stroke-width="4" stroke-linecap="round"/>
      <text x="3" y="69" class="small" fill="#afc9b6">seed</text>
      <text x="78" y="69" class="small" fill="#afc9b6">sprout</text>
      <text x="169" y="69" class="small" fill="#afc9b6">leaf</text>
      <text x="256" y="69" class="small" fill="#afc9b6">bud</text>
      <text x="339" y="69" class="small" fill="#afc9b6">bloom</text>
    </g>
  </g>
</svg>
